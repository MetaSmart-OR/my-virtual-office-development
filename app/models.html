<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Settings - Virtual Office</title>
    <script>fetch('/vo-config').then(r=>r.json()).then(d=>{if(d.office&&d.office.name)document.title='Model Settings - '+d.office.name;}).catch(()=>{});</script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0d0d1a; --surface:#141428; --border:#2a2a4a; --gold:#ffd700; --text:#d8d8e8; --text-dim:#8f91aa; --green:#4caf50; --red:#f44336; --blue:#2196f3; --purple:#8b5cf6; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--text); font-family:'Press Start 2P', monospace; font-size:8px; line-height:1.6; padding:10px; }
        h1 { font-size:12px; color:var(--gold); margin-bottom:12px; }
        h2 { font-size:9px; color:var(--gold); margin:14px 0 8px; }
        h3 { font-size:8px; color:var(--gold); margin:10px 0 6px; }
        p { margin:5px 0; }
        .back-btn { display:inline-block; padding:6px 12px; background:var(--surface); color:var(--gold); border:1px solid var(--border); border-radius:4px; cursor:pointer; font-family:inherit; font-size:7px; margin-bottom:10px; text-decoration:none; }
        .tabs { display:flex; gap:4px; margin-bottom:12px; flex-wrap:wrap; }
        .tab { padding:6px 10px; background:var(--surface); border:1px solid var(--border); border-radius:4px 4px 0 0; cursor:pointer; font-family:inherit; font-size:7px; color:var(--text-dim); }
        .tab.active { background:var(--border); color:var(--gold); }
        .panel { display:none; }
        .panel.active { display:block; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:10px; margin-bottom:10px; }
        .provider-header { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }
        .provider-name { font-size:9px; color:var(--gold); overflow-wrap:anywhere; }
        .muted { color:var(--text-dim); }
        .ok { color:var(--green); }
        .err { color:var(--red); }
        .tag { display:inline-block; padding:2px 5px; border:1px solid var(--border); border-radius:3px; margin:2px; color:var(--text-dim); }
        input, select, textarea { font-family:'Press Start 2P', monospace; font-size:7px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:3px; padding:5px 6px; width:100%; }
        textarea { min-height:64px; resize:vertical; }
        .row { display:flex; gap:6px; align-items:center; margin:6px 0; flex-wrap:wrap; }
        .row label { min-width:102px; color:var(--text-dim); flex-shrink:0; }
        .row input, .row select, .row textarea { flex:1; min-width:190px; }
        .btn { padding:5px 10px; font-family:inherit; font-size:7px; border:none; border-radius:3px; cursor:pointer; white-space:nowrap; margin:2px 2px 2px 0; }
        .btn-gold { background:var(--gold); color:#000; }
        .btn-green { background:var(--green); color:#fff; }
        .btn-red { background:var(--red); color:#fff; }
        .btn-blue { background:var(--blue); color:#fff; }
        .btn-purple { background:var(--purple); color:#fff; }
        .model-list { max-height:280px; overflow-y:auto; margin:6px 0; border:1px solid var(--border); border-radius:4px; }
        .model-item { padding:4px 6px; font-size:7px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:8px; align-items:center; }
        .model-item:last-child { border-bottom:none; }
        .status-msg { font-size:7px; margin:6px 0; min-height:12px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:10px; }
        .wide { grid-column:1 / -1; }
        code { color:var(--gold); overflow-wrap:anywhere; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    </style>
</head>
<body>
    <a class="back-btn" href="/">← Back to Office</a>
    <h1>⚙️ Model & Provider Settings</h1>
    <div class="tabs">
        <div class="tab active" onclick="showTab(event,'openclaw')">🧠 OpenClaw Models</div>
        <div class="tab" onclick="showTab(event,'hermes')">☤ Hermes Models</div>
        <div class="tab" onclick="showTab(event,'setup')">⚙️ Native Setup</div>
    </div>
    <div id="panel-openclaw" class="panel active"><div id="openclaw-models">Loading...</div></div>
    <div id="panel-hermes" class="panel"><div id="hermes-models">Loading...</div></div>
    <div id="panel-setup" class="panel"><div id="native-setup">Loading...</div></div>

<script>
let nativeData = null;

function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function val(id) {
    const el = document.getElementById(id);
    return el ? el.value.trim() : '';
}

function setStatus(id, data, okText = 'Saved') {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'status-msg ' + (data.ok ? 'ok' : 'err');
    el.textContent = data.ok ? okText : (data.error || 'Failed');
}

function showTab(event, name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
}

async function loadNativeModels() {
    const res = await fetch('/api/native-models', { cache:'no-store' });
    nativeData = await res.json();
    renderOpenClaw();
    renderHermes();
    renderSetup();
}

function modelOptions(models, current, providerFilter) {
    const filtered = (models || [])
        .filter(m => !providerFilter || m.provider === providerFilter)
        .filter(m => !m.missing)
        .sort((a,b) => (a.provider + a.name).localeCompare(b.provider + b.name));
    return filtered.map(m => {
        const label = (m.provider ? m.provider + '/' : '') + (m.name || m.id);
        return `<option value="${esc(m.id)}" ${m.id === current ? 'selected' : ''}>${esc(label)}</option>`;
    }).join('');
}

function providerOptions(providers, current) {
    return (providers || []).sort().map(p => `<option value="${esc(p)}" ${p === current ? 'selected' : ''}>${esc(p)}</option>`).join('');
}

function renderOpenClaw() {
    const root = document.getElementById('openclaw-models');
    const oc = nativeData.openclaw || {};
    if (!oc.ok) {
        root.innerHTML = `<div class="card err">OpenClaw model catalog failed: ${esc(oc.error || 'unknown error')}</div>`;
        return;
    }
    const agents = Object.values(oc.agents || {}).sort((a,b) => a.id.localeCompare(b.id));
    const byProvider = {};
    for (const m of oc.models || []) (byProvider[m.provider || 'unknown'] ||= []).push(m);
    let html = `<div class="grid">
        <div class="card wide">
            <div class="provider-header">
                <div><div class="provider-name">OpenClaw Available Models</div><div class="muted">${(oc.models||[]).length} models · ${(oc.providers||[]).length} providers · default <code>${esc(oc.defaultModel || 'none')}</code></div></div>
                <button class="btn btn-blue" onclick="reloadNative()">Refresh</button>
            </div>
            <h3>Auth Profiles</h3>${renderAuthTags(oc.authProfiles)}
        </div>
        <div class="card">
            <div class="provider-name">Add Cloud API Key</div>
            <div class="row"><label>Provider</label><input id="oc-key-provider" placeholder="openai, anthropic, google, openrouter"></div>
            <div class="row"><label>Profile ID</label><input id="oc-key-profile" placeholder="optional, provider:manual"></div>
            <div class="row"><label>API Key</label><input id="oc-key-value" type="password" autocomplete="off" placeholder="paste key"></div>
            <button class="btn btn-green" onclick="saveOpenClawApiKey()">Save API Key</button>
            <div class="row"><label>Delete Profile</label><select id="oc-key-delete-profile">${(oc.authProfiles||[]).map(p => `<option value="${esc(p.id || p.profileId || '')}">${esc(p.id || p.profileId || p.label || '')}</option>`).join('')}</select></div>
            <button class="btn btn-red" onclick="deleteOpenClawApiKey()">Delete API Key Profile</button>
            <p id="oc-key-status" class="status-msg"></p>
        </div>
        <div class="card">
            <div class="provider-name">Add Local or Custom Provider</div>
            <div class="row"><label>Preset</label><select id="oc-provider-preset" onchange="fillOpenClawPreset()"><option value="custom">Custom OpenAI-compatible</option><option value="ollama">Ollama</option><option value="lmstudio">LM Studio</option></select></div>
            <div class="row"><label>Provider ID</label><input id="oc-provider-id" value="custom"></div>
            <div class="row"><label>Base URL</label><input id="oc-provider-url" placeholder="http://localhost:1234/v1"></div>
            <div class="row"><label>API</label><select id="oc-provider-api"><option value="openai-completions">OpenAI-compatible</option><option value="ollama">Ollama native</option></select></div>
            <div class="row"><label>API Key</label><input id="oc-provider-key" type="password" autocomplete="off" placeholder="optional"></div>
            <div class="row"><label>Models</label><textarea id="oc-provider-models" placeholder="one model per line"></textarea></div>
            <button class="btn btn-green" onclick="saveOpenClawProvider()">Save Provider</button>
            <p id="oc-provider-status" class="status-msg"></p>
        </div>
        <div class="card">
            <div class="provider-name">Delete Provider</div>
            <div class="row"><label>Provider</label><select id="oc-delete-provider">${providerOptions(oc.providers, '')}</select></div>
            <button class="btn btn-red" onclick="deleteOpenClawProvider()">Delete Provider</button>
            <p id="oc-delete-status" class="status-msg"></p>
        </div>
        <div class="card wide">
            <div class="provider-name">Assign OpenClaw Agent Models</div>
            <div class="grid">${agents.map(agent => {
                const model = agent.model || oc.defaultModel || '';
                return `<div class="card">
                    <div class="provider-header"><div class="provider-name">${esc(agent.id)}</div><div class="muted">${esc(model || 'default')}</div></div>
                    <div class="row"><label>Model</label><select id="oc-agent-${esc(agent.id)}"><option value="">Default (${esc(oc.defaultModel || 'none')})</option>${modelOptions(oc.models, model)}</select></div>
                    <button class="btn btn-green" onclick="setOpenClawAgentModel('${esc(agent.id)}')">Apply</button>
                    <p id="oc-agent-status-${esc(agent.id)}" class="status-msg"></p>
                </div>`;
            }).join('')}</div>
        </div>`;
    for (const provider of Object.keys(byProvider).sort()) {
        const models = byProvider[provider].sort((a,b) => a.id.localeCompare(b.id));
        html += `<div class="card"><div class="provider-header"><div class="provider-name">${esc(provider)}</div><div class="muted">${models.length}</div></div><div class="model-list">`;
        for (const m of models) html += `<div class="model-item"><span>${esc(m.id)}</span><span class="${m.available ? 'ok' : 'err'}">${m.available ? (m.local ? 'local' : 'available') : 'missing'}</span></div>`;
        html += '</div></div>';
    }
    html += '</div>';
    root.innerHTML = html;
}

function renderAuthTags(authProfiles) {
    if (!authProfiles || !authProfiles.length) return '<div class="muted">No auth profiles reported.</div>';
    return authProfiles.map(p => `<span class="tag">${esc(p.id || p.profileId || p.label)} · ${esc(p.provider)} · ${esc(p.type || p.mode || 'profile')}</span>`).join('');
}

function renderHermesAuth(auth) {
    if (!auth || !auth.length) return '<div class="muted">No auth credentials reported.</div>';
    return auth.map(p => `<div><span class="tag">${esc(p.provider)}</span>${(p.credentials||[]).map(c => `<span class="tag">${esc(c.label || c.source)} · ${esc(c.type)}</span>`).join('')}</div>`).join('');
}

function renderHermes() {
    const root = document.getElementById('hermes-models');
    const hermes = nativeData.hermes || {};
    const profiles = hermes.profiles || [];
    const profileOpts = profiles.map(p => `<option value="${esc(p.id)}">${esc(p.id)}</option>`).join('');
    const providers = hermes.providers || [];
    let html = `<div class="grid">
        <div class="card wide">
            <div class="provider-header">
                <div><div class="provider-name">Hermes Native Models</div><div class="muted">${(hermes.models||[]).length} models · ${profiles.length} profiles · ${(hermes.modelAliases||[]).length} custom aliases</div></div>
                <button class="btn btn-blue" onclick="reloadNative()">Refresh</button>
            </div>
        </div>
        <div class="card">
            <div class="provider-name">Add Hermes API Key</div>
            <div class="row"><label>Provider</label><input id="hm-key-provider" placeholder="openai-codex, anthropic, openrouter"></div>
            <div class="row"><label>Label</label><input id="hm-key-label" placeholder="Virtual Office"></div>
            <div class="row"><label>API Key</label><input id="hm-key-value" type="password" autocomplete="off" placeholder="paste key"></div>
            <button class="btn btn-green" onclick="saveHermesApiKey()">Save API Key</button>
            <p id="hm-key-status" class="status-msg"></p>
        </div>
        <div class="card">
            <div class="provider-name">Add Hermes Local or Custom Provider</div>
            <div class="row"><label>Profile</label><select id="hm-provider-profile">${profileOpts}</select></div>
            <div class="row"><label>Preset</label><select id="hm-provider-preset" onchange="fillHermesPreset()"><option value="custom">Custom OpenAI-compatible</option><option value="ollama">Ollama</option><option value="lmstudio">LM Studio</option></select></div>
            <div class="row"><label>Provider ID</label><input id="hm-provider-id" value="custom"></div>
            <div class="row"><label>Base URL</label><input id="hm-provider-url" placeholder="http://localhost:1234/v1"></div>
            <div class="row"><label>Models</label><textarea id="hm-provider-models" placeholder="one model per line"></textarea></div>
            <button class="btn btn-green" onclick="saveHermesProvider()">Save Provider</button>
            <p id="hm-provider-status" class="status-msg"></p>
        </div>
        <div class="card">
            <div class="provider-name">Delete Hermes Provider or Auth</div>
            <div class="row"><label>Profile</label><select id="hm-delete-profile">${profileOpts}</select></div>
            <div class="row"><label>Provider</label><select id="hm-delete-provider">${providerOptions(providers, '')}</select></div>
            <button class="btn btn-red" onclick="deleteHermesProvider()">Delete Provider Aliases</button>
            <div class="row"><label>Auth Target</label><input id="hm-delete-auth-target" placeholder="credential label, id, or index"></div>
            <button class="btn btn-red" onclick="deleteHermesAuth()">Delete Auth</button>
            <p id="hm-delete-status" class="status-msg"></p>
        </div>`;
    for (const profile of profiles) {
        const current = profile.provider && profile.model ? `${profile.provider}/${profile.model}` : '';
        html += `<div class="card">
            <div class="provider-header"><div><div class="provider-name">${esc(profile.id)}</div><div class="muted">${esc(profile.configPath)}</div></div><div>${esc(current || 'not set')}</div></div>
            <div class="row"><label>Provider</label><select id="hm-prov-${esc(profile.id)}" onchange="syncHermesModelOptions('${esc(profile.id)}')">${providerOptions(providers, profile.provider)}</select></div>
            <div class="row"><label>Model</label><select id="hm-model-${esc(profile.id)}">${modelOptions(hermes.models, current, profile.provider)}</select></div>
            <button class="btn btn-green" onclick="setHermesProfileModel('${esc(profile.id)}')">Apply</button>
            <p id="hm-status-${esc(profile.id)}" class="status-msg"></p>
            <h3>Auth</h3>${renderHermesAuth(profile.auth)}
        </div>`;
    }
    if ((hermes.modelAliases || []).length) {
        html += `<div class="card wide"><div class="provider-name">Hermes Custom Aliases</div><div class="model-list">${hermes.modelAliases.map(a => `<div class="model-item"><span>${esc(a.alias)} → ${esc(a.provider)}/${esc(a.model)}</span><span>${esc(a.profile)}</span></div>`).join('')}</div></div>`;
    }
    html += '</div>';
    root.innerHTML = html;
}

function syncHermesModelOptions(profileId) {
    const hermes = nativeData.hermes || {};
    const provider = document.getElementById('hm-prov-' + profileId).value;
    document.getElementById('hm-model-' + profileId).innerHTML = modelOptions(hermes.models, '', provider);
}

function renderSetup() {
    const root = document.getElementById('native-setup');
    root.innerHTML = `<div class="grid">
        <div class="card"><div class="provider-name">OpenClaw Native Setup</div>
            <p class="muted">Virtual Office writes the same native OpenClaw model/auth surfaces users would use from terminal.</p>
            <p><code>openclaw models auth paste-api-key --provider &lt;provider&gt;</code></p>
            <p><code>openclaw models auth login --provider &lt;provider&gt;</code></p>
            <p><code>models.providers.&lt;provider&gt;.models[]</code></p>
            <p><code>openclaw models list --all --json</code></p>
        </div>
        <div class="card"><div class="provider-name">Hermes Native Setup</div>
            <p class="muted">Virtual Office writes Hermes auth entries and the model config/alias fields Hermes itself reads.</p>
            <p><code>hermes auth add &lt;provider&gt; --type api-key</code></p>
            <p><code>hermes auth add &lt;provider&gt; --type oauth</code></p>
            <p><code>model.provider / model.default / model.base_url</code></p>
            <p><code>model_aliases.&lt;alias&gt;</code></p>
        </div>
        <div class="card wide"><div class="provider-name">OAuth Note</div>
            <p class="muted">API keys and local/custom providers can be completed inside Virtual Office. OAuth needs an interactive browser/device callback; the next step is wiring a guided callback window so users never touch terminal.</p>
        </div>
    </div>`;
}

function fillOpenClawPreset() {
    const preset = val('oc-provider-preset');
    if (preset === 'ollama') {
        document.getElementById('oc-provider-id').value = 'ollama';
        document.getElementById('oc-provider-url').value = 'http://localhost:11434';
        document.getElementById('oc-provider-api').value = 'ollama';
    } else if (preset === 'lmstudio') {
        document.getElementById('oc-provider-id').value = 'lmstudio';
        document.getElementById('oc-provider-url').value = 'http://localhost:1234/v1';
        document.getElementById('oc-provider-api').value = 'openai-completions';
    } else {
        document.getElementById('oc-provider-id').value = 'custom';
        document.getElementById('oc-provider-url').value = '';
        document.getElementById('oc-provider-api').value = 'openai-completions';
    }
}

function fillHermesPreset() {
    const preset = val('hm-provider-preset');
    if (preset === 'ollama') {
        document.getElementById('hm-provider-id').value = 'custom';
        document.getElementById('hm-provider-url').value = 'http://localhost:11434/v1';
    } else if (preset === 'lmstudio') {
        document.getElementById('hm-provider-id').value = 'lmstudio';
        document.getElementById('hm-provider-url').value = 'http://localhost:1234/v1';
    } else {
        document.getElementById('hm-provider-id').value = 'custom';
        document.getElementById('hm-provider-url').value = '';
    }
}

async function postJson(url, body) {
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    return await res.json();
}

async function saveOpenClawApiKey() {
    const data = await postJson('/api/native-models/openclaw/auth/api-key', { provider:val('oc-key-provider'), profileId:val('oc-key-profile'), apiKey:val('oc-key-value') });
    setStatus('oc-key-status', data, 'Saved ' + (data.profileId || data.provider));
    if (data.ok) { document.getElementById('oc-key-value').value = ''; setTimeout(reloadNative, 800); }
}

async function deleteOpenClawApiKey() {
    const profileId = val('oc-key-delete-profile');
    if (!profileId || !confirm('Delete OpenClaw API key profile ' + profileId + '?')) return;
    const provider = profileId.includes(':') ? profileId.split(':')[0] : '';
    const data = await postJson('/api/native-models/openclaw/auth/delete', { provider, profileId });
    setStatus('oc-key-status', data, 'Deleted ' + profileId);
    if (data.ok) setTimeout(reloadNative, 800);
}

async function saveOpenClawProvider() {
    const data = await postJson('/api/native-models/openclaw/provider', { provider:val('oc-provider-id'), baseUrl:val('oc-provider-url'), api:val('oc-provider-api'), apiKey:val('oc-provider-key'), models:val('oc-provider-models') });
    setStatus('oc-provider-status', data, 'Saved ' + (data.provider || 'provider'));
    if (data.ok) { document.getElementById('oc-provider-key').value = ''; setTimeout(reloadNative, 800); }
}

async function deleteOpenClawProvider() {
    const provider = val('oc-delete-provider');
    if (!provider || !confirm('Delete OpenClaw provider ' + provider + '?')) return;
    const data = await postJson('/api/native-models/openclaw/provider/delete', { provider });
    setStatus('oc-delete-status', data, 'Deleted ' + provider);
    if (data.ok) setTimeout(reloadNative, 800);
}

async function setOpenClawAgentModel(agentId) {
    const data = await postJson('/api/native-models/openclaw/agent-model', { agent:agentId, model:val('oc-agent-' + agentId) });
    setStatus('oc-agent-status-' + agentId, data, 'Applied');
    if (data.ok) setTimeout(reloadNative, 800);
}

async function saveHermesApiKey() {
    const data = await postJson('/api/native-models/hermes/auth/api-key', { provider:val('hm-key-provider'), label:val('hm-key-label'), apiKey:val('hm-key-value') });
    setStatus('hm-key-status', data, 'Saved ' + (data.label || data.provider));
    if (data.ok) { document.getElementById('hm-key-value').value = ''; setTimeout(reloadNative, 800); }
}

async function saveHermesProvider() {
    const data = await postJson('/api/native-models/hermes/provider', { profile:val('hm-provider-profile'), provider:val('hm-provider-id'), baseUrl:val('hm-provider-url'), models:val('hm-provider-models') });
    setStatus('hm-provider-status', data, 'Saved ' + (data.provider || 'provider'));
    if (data.ok) setTimeout(reloadNative, 800);
}

async function deleteHermesProvider() {
    const provider = val('hm-delete-provider');
    if (!provider || !confirm('Delete Hermes custom aliases/cache for ' + provider + '?')) return;
    const data = await postJson('/api/native-models/hermes/provider/delete', { profile:val('hm-delete-profile'), provider });
    setStatus('hm-delete-status', data, 'Deleted ' + provider);
    if (data.ok) setTimeout(reloadNative, 800);
}

async function deleteHermesAuth() {
    const data = await postJson('/api/native-models/hermes/auth/delete', { provider:val('hm-delete-provider'), target:val('hm-delete-auth-target') });
    setStatus('hm-delete-status', data, 'Deleted auth');
    if (data.ok) setTimeout(reloadNative, 800);
}

async function setHermesProfileModel(profileId) {
    const modelValue = val('hm-model-' + profileId);
    const model = modelValue.includes('/') ? modelValue.split('/').slice(1).join('/') : modelValue;
    const data = await postJson('/api/native-models/hermes/profile-model', { profile:profileId, provider:val('hm-prov-' + profileId), model });
    setStatus('hm-status-' + profileId, data, 'Applied');
    if (data.ok) setTimeout(reloadNative, 800);
}

function reloadNative() {
    document.getElementById('openclaw-models').textContent = 'Loading...';
    document.getElementById('hermes-models').textContent = 'Loading...';
    loadNativeModels().catch(e => {
        document.getElementById('openclaw-models').innerHTML = `<div class="card err">${esc(e.message)}</div>`;
    });
}

reloadNative();
</script>
</body>
</html>
